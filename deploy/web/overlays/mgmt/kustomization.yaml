apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - target:
      kind: HTTPRoute
      name: footing-web
    path: httproute-mgmt.yaml
  # Pas d'IaC Authentik pour le hostname mgmt aujourd'hui (le Provider
  # Authentik est défini pour footing.staging.lab.musso.io uniquement).
  # On strip le filter forward-auth jusqu'à ce qu'on ajoute un 2e Provider
  # sous tofu/live/mgmt/authentik/apps/footing/.
  - target:
      kind: HTTPRoute
      name: footing-web
    patch: |-
      - op: remove
        path: /spec/rules/0/filters
images:
  - name: ghcr.io/popul/footing-web
    # :latest n'a jamais été publié par la CI (qui ne pousse que
    # sha-<commit> et :main), d'où l'ImagePullBackOff historique sur
    # ce overlay. Pin sur un sha fixe = bump manuel par PR. Sha
    # = état de la prod restauré depuis homelab@8845700 (avant
    # /welcome.html et le redirect / vers welcome qui sont gated
    # par l'IaC Authentik côté staging uniquement).
    newTag: sha-3477fb18655d
