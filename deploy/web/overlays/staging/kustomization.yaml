apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
patches:
- path: httproute-staging.yaml
  target:
    kind: HTTPRoute
    name: footing-web
# Staging = ce que protège l'IaC Authentik (cf. tofu/live/staging/authentik
# côté homelab). Le filter de la HTTPRoute est gardé tel que défini dans
# base/ → forward-auth actif vers auth.lab.musso.io.
images:
- name: ghcr.io/popul/footing-web
  newName: ghcr.io/popul/footing-web
  newTag: sha-a3678307dc66
