# L'hostname et la parent ref Gateway sont définis dans chaque overlay
# (mgmt → cluster k3s principal, staging → tenant CAPI/Kamaji). Le filter
# ExtensionRef → Middleware authentik-forward-auth force l'auth Authentik
# pour toute requête atteignant footing-web.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: footing-web
spec:
  parentRefs: []
  hostnames: []
  rules:
    - filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: authentik-forward-auth
      backendRefs:
        - name: footing-web
          port: 80
