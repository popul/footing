# Traefik Middleware déléguant l'authentification à l'outpost Authentik.
# L'outpost est attendu sous le service `ak-outpost-footing` (cf. Authentik
# UI → Applications → Footing → Outpost) dans le namespace `authentik`. Les
# overlays peuvent patcher `forwardAuth.address` pour pointer ailleurs si
# l'outpost vit dans un autre cluster / namespace.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authentik-forward-auth
spec:
  forwardAuth:
    address: http://ak-outpost-footing.authentik.svc.cluster.local:9000/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-Authentik-Username
      - X-Authentik-Groups
      - X-Authentik-Email
      - X-Authentik-Name
      - X-Authentik-Uid
      - Set-Cookie
