# Traefik Middleware déléguant l'authentification à l'outpost Authentik
# dédié `homelab-apps`. Cet outpost est provisionné par OpenTofu+Terragrunt
# dans le repo homelab (tofu/live/mgmt/authentik/outposts/homelab-apps/),
# qui crée aussi le Deployment + Service k8s `ak-outpost-homelab-apps`
# dans le namespace `authentik`.
#
# Provider Proxy + Application Authentik liés à cet outpost sont également
# provisionnés via tofu (tofu/live/mgmt/authentik/apps/footing/).
#
# Les overlays peuvent patcher `forwardAuth.address` pour pointer ailleurs
# si l'outpost vit dans un autre cluster / namespace (cas staging).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authentik-forward-auth
spec:
  forwardAuth:
    address: http://ak-outpost-homelab-apps.authentik.svc.cluster.local:9000/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-Authentik-Username
      - X-Authentik-Groups
      - X-Authentik-Email
      - X-Authentik-Name
      - X-Authentik-Uid
      - Set-Cookie
