# Traefik Middleware déléguant l'authentification à l'outpost embarqué
# d'Authentik. URL publique LAN/Tailscale plutôt que le Service interne :
# ça permet à la Traefik staging (qui ne peut pas résoudre les Services
# du namespace authentik du mgmt) de joindre le même outpost via le
# routage normal vers homelab01:443 → Traefik mgmt → authentik-server.
#
# Provider Proxy + Application Authentik + binding à l'outpost embarqué
# sont provisionnés via tofu dans le repo homelab :
#   tofu/live/staging/authentik/apps/footing/   (Provider + Application)
#   tofu/live/mgmt/authentik/outposts/embedded/ (binding sur l'outpost)
#
# Les overlays peuvent stripper le filter de la HTTPRoute pour désactiver
# l'auth quand aucun Provider Authentik n'est défini pour ce hostname.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authentik-forward-auth
spec:
  forwardAuth:
    address: http://auth.lab.musso.io/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-Authentik-Username
      - X-Authentik-Groups
      - X-Authentik-Email
      - X-Authentik-Name
      - X-Authentik-Uid
      - Set-Cookie
